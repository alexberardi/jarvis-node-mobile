name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --ci --coverage --forceExit

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  build-and-submit:
    name: Build iOS & Submit to TestFlight
    needs: [lint-and-typecheck, test]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Select Xcode 26
        run: |
          XCODE26=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | head -1)
          if [ -n "$XCODE26" ]; then
            sudo xcode-select -s "$XCODE26"
            echo "Selected $XCODE26"
          else
            echo "Available Xcode versions:"
            ls -d /Applications/Xcode*.app
            echo "::warning::Xcode 26 not available on this runner — build may fail App Store upload"
          fi
          xcodebuild -version

      - name: Write Apple API key
        run: echo "$APPLE_API_KEY_P8" > ${{ github.workspace }}/apple-api-key.p8
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}

      - name: Build iOS locally
        run: eas build --platform ios --profile production --local --non-interactive --output ${{ github.workspace }}/build.ipa
        env:
          EXPO_ASC_API_KEY_PATH: ${{ github.workspace }}/apple-api-key.p8
          EXPO_ASC_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          EXPO_ASC_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}

      - name: Submit to TestFlight
        run: eas submit --platform ios --profile production --path ${{ github.workspace }}/build.ipa --non-interactive
        env:
          EXPO_ASC_API_KEY_PATH: ${{ github.workspace }}/apple-api-key.p8
          EXPO_ASC_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          EXPO_ASC_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}

  build-and-submit-android:
    name: Build Android & Submit to Play Store
    needs: [lint-and-typecheck, test]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write Google Play service account key
        run: echo "$GOOGLE_SERVICE_ACCOUNT_JSON" > ${{ github.workspace }}/google-service-account.json
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

      - name: Build Android locally
        run: eas build --platform android --profile production --local --non-interactive --output ${{ github.workspace }}/build.aab

      - name: Submit to Play Store
        run: eas submit --platform android --profile production --path ${{ github.workspace }}/build.aab --non-interactive
