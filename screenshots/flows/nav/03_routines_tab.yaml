appId: com.jarvis.nodemobile
---
# Test: Routines tab loads
- launchApp
- waitForAnimationToEnd
- tapOn:
    text: ".*localhost.*"
    index: 0
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Jarvis"
    timeout: 15000
# Tap Routines tab (3rd of 4)
- tapOn:
    point: "62%,97%"
- waitForAnimationToEnd
- waitForAnimationToEnd
- takeScreenshot: routines
