appId: com.jarvis.nodemobile
---
# Test: Home tab loads with header, input bar, and tab navigation
- launchApp
- waitForAnimationToEnd
- tapOn:
    text: ".*localhost.*"
    index: 0
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Jarvis"
    timeout: 15000
- assertVisible: { text: ".*Ask Jarvis anything.*" }
- takeScreenshot: home
