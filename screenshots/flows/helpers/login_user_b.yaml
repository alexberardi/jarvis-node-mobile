appId: com.jarvis.nodemobile
env:
  USER_B_EMAIL: ${E2E_USER_B_EMAIL}
  USER_B_PASSWORD: ${E2E_USER_B_PASSWORD}
---
# Helper: Login as User B (member)
- tapOn: "Log In"
- waitForAnimationToEnd
- tapOn: "Email"
- inputText: ${USER_B_EMAIL}
- tapOn: "Password"
- inputText: ${USER_B_PASSWORD}
- tapOn:
    text: "Log In"
    index: 1
- extendedWaitUntil:
    visible: "Jarvis"
    timeout: 15000
