appId: com.jarvis.nodemobile
---
# Test: Tapping a node opens its settings screen
- launchApp
- waitForAnimationToEnd
- tapOn:
    text: ".*localhost.*"
    index: 0
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Jarvis"
    timeout: 15000
# Tap Nodes tab
- tapOn: "Nodes"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Import Key"
    timeout: 10000
# Tap first node card
- tapOn:
    text: ".*office.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: node-settings
