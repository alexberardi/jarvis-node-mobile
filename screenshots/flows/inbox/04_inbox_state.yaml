appId: com.jarvis.nodemobile
---
# Test: Inbox opens and shows either empty state or notification items
- launchApp
- waitForAnimationToEnd
- tapOn:
    text: ".*localhost.*"
    index: 0
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Jarvis"
    timeout: 15000

# Tap inbox bell icon
- tapOn:
    point: "89%,9%"
- waitForAnimationToEnd

# Wait for inbox to load
- extendedWaitUntil:
    visible: "Inbox"
    timeout: 10000

# Should see either empty state or items
- extendedWaitUntil:
    visible:
      text: ".*No messages.*|.*ago.*|.*research.*|.*alert.*"
    timeout: 10000
- takeScreenshot: inbox-state
