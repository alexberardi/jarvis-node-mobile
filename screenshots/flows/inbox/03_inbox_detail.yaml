appId: com.jarvis.nodemobile
---
# Test: Tapping an inbox item opens detail view with full body
- launchApp
- waitForAnimationToEnd
- tapOn:
    text: ".*localhost.*"
    index: 0
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Jarvis"
    timeout: 15000
# Open inbox
- tapOn:
    point: "89%,9%"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Inbox"
    timeout: 10000
# Tap first inbox item (if any exist)
- tapOn:
    index: 0
    point: "50%,25%"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: inbox-detail
