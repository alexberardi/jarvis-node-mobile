appId: com.jarvis.nodemobile
---
# Test: Connection section shows Local chip and service URLs
- launchApp
- waitForAnimationToEnd
- tapOn:
    text: ".*localhost.*"
    index: 0
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Jarvis"
    timeout: 15000

# Open settings
- runFlow:
    file: ../helpers/open_settings.yaml

# Scroll to Connection section
- swipe:
    start: "50%,80%"
    end: "50%,40%"
- waitForAnimationToEnd

# Verify connection info
- assertVisible: "Connection"
- assertVisible: "Local"
- assertVisible:
    text: ".*localhost.*"
- takeScreenshot: settings-connection-local
