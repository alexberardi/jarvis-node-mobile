appId: com.jarvis.nodemobile
---
# Test: Chat auto-play TTS toggle is visible and interactive
- launchApp
- waitForAnimationToEnd
- tapOn:
    text: ".*localhost.*"
    index: 0
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Jarvis"
    timeout: 15000
# Open settings
- tapOn:
    point: "78%,9%"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Settings"
    timeout: 10000
- assertVisible: "Chat"
- assertVisible: { text: ".*Auto-play responses.*" }
- assertVisible: { text: ".*Automatically speak Jarvis responses aloud.*" }
- takeScreenshot: settings-auto-play
