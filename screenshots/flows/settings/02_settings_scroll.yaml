appId: com.jarvis.nodemobile
---
# Test: Settings scrolls to show Smart Home and Config URL sections
- launchApp
- waitForAnimationToEnd
- tapOn:
    text: ".*localhost.*"
    index: 0
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Jarvis"
    timeout: 15000
# Tap cog icon
- tapOn:
    point: "78%,9%"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Settings"
    timeout: 10000
# Scroll down to see more settings
- swipe:
    start: "50%,80%"
    end: "50%,30%"
- waitForAnimationToEnd
- assertVisible: { text: ".*Config Service URL.*" }
- takeScreenshot: settings-smart-home
