appId: com.jarvis.nodemobile
---
# Test: Register screen shows error when passwords don't match
- launchApp
- waitForAnimationToEnd
- tapOn:
    text: ".*localhost.*"
    index: 0
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Create Account"
    timeout: 10000
- tapOn: "Create Account"
- waitForAnimationToEnd
- tapOn: "Email"
- inputText: "test@test.com"
- tapOn: "Password"
- inputText: "StrongPass1"
- tapOn: "Confirm Password"
- inputText: "StrongPass2"
# Try to submit
- tapOn: "Create Account"
- waitForAnimationToEnd
- assertVisible:
    text: ".*match.*"
- takeScreenshot: register-password-mismatch
