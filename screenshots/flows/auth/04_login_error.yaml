appId: com.jarvis.nodemobile
---
# Test: Login with bad credentials shows error message
- launchApp
- waitForAnimationToEnd
- tapOn:
    text: ".*localhost.*"
    index: 0
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Log In"
    timeout: 10000
- tapOn: "Log In"
- waitForAnimationToEnd
- tapOn: "Email"
- inputText: "bad@example.com"
- tapOn: "Password"
- inputText: "wrongpassword"
- tapOn:
    text: "Log In"
    index: 1
- waitForAnimationToEnd
# Should still be on login screen (not navigated away)
- extendedWaitUntil:
    visible: "Email"
    timeout: 10000
- takeScreenshot: auth-login-error
