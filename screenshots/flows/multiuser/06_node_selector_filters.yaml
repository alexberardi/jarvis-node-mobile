appId: com.jarvis.nodemobile
env:
  USER_A_EMAIL: ${E2E_USER_A_EMAIL}
  USER_A_PASSWORD: ${E2E_USER_A_PASSWORD}
---
# Test: Home screen node selector only shows nodes for active household

- runFlow:
    file: ../helpers/ensure_logged_out.yaml
- runFlow:
    file: ../helpers/login_user_a.yaml

# Ensure "Test Home" is active via settings
- tapOn:
    point: "78%,9%"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Settings"
    timeout: 10000
- extendedWaitUntil:
    visible: ".*Test Home.*"
    timeout: 10000
- tapOn:
    text: "Test Home"
    optional: true
- waitForAnimationToEnd

# Close settings via testID
- tapOn:
    id: "settings-close"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Jarvis"
    timeout: 10000

# Node selector should be visible (scoped to Test Home)
- takeScreenshot: multiuser-node-selector

# Logout
- runFlow:
    file: ../helpers/logout.yaml
