appId: com.jarvis.nodemobile
---
# Test: Home screen shows empty state with quick action chips
- launchApp
- waitForAnimationToEnd
- tapOn:
    text: ".*localhost.*"
    index: 0
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Jarvis"
    timeout: 15000
- assertVisible: { text: ".*Ask Jarvis anything.*" }
- assertVisible: { text: ".*Message Jarvis.*" }
# Verify at least one quick action chip is visible
- assertVisible:
    text: "Weather|Email|Calculate|Research"
    optional: true
- takeScreenshot: home-empty
