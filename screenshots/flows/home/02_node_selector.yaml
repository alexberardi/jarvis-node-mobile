appId: com.jarvis.nodemobile
---
# Test: Node selector is visible and shows connected node
- launchApp
- waitForAnimationToEnd
- tapOn:
    text: ".*localhost.*"
    index: 0
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Jarvis"
    timeout: 15000
# Node selector should show the office node
- assertVisible:
    text: "office"
    enabled: true
- takeScreenshot: home-node-selector
