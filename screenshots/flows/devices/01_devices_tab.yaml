appId: com.jarvis.nodemobile
---
# Test: Devices tab shows device list or empty state
- launchApp
- waitForAnimationToEnd
- tapOn:
    text: ".*localhost.*"
    index: 0
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Jarvis"
    timeout: 15000
# Tap Devices tab
- tapOn: "Devices"
- waitForAnimationToEnd
- takeScreenshot: devices-list
