appId: com.jarvis.nodemobile
name: login
# Reusable auth subflow. Drives the Login screen (src/screens/Auth/LoginScreen.tsx)
# with EMAIL/PASSWORD from the parent flow's env (override per-run with
# `maestro test -e EMAIL=... -e PASSWORD=...`). The email-input / password-input /
# login-button testIDs were added alongside this flow.
---
- assertVisible:
    id: "email-input"
- tapOn:
    id: "email-input"
- inputText: "${EMAIL}"
- tapOn:
    id: "password-input"
- inputText: "${PASSWORD}"
# Dismiss the keyboard via a neutral tap (hideKeyboard is unreliable on RN Paper
# inputs and a live keyboard swallows the login tap). Same pattern as the
# provisioning flow.
- tapOn:
    point: "50%,12%"
- tapOn:
    id: "login-button"
